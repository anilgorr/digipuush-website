<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!--
      This static form exists solely so Netlify's build-time bot can detect the
      "contact" form and its fields. The real forms (ContactForm, LeadForm) are
      React components that POST url-encoded data to this file's path with a
      matching form-name. Do not delete.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="website" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <textarea name="message"></textarea>
      <input type="text" name="source" />
      <input type="text" name="website" />
    </form>
  </body>
</html>
